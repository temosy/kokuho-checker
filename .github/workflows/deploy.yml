# Merge to main = auto-deploy. Mirrors the sibling temosy/system-kakari workflow.
#
# - test: GitHub-hosted ubuntu runner runs the same checks as local dev
#   (cargo test + clippy). Runs on every push and PR.
# - deploy: a self-hosted runner ON the Fedora prod box (LAN-only, unreachable
#   from GitHub, so pull-based) syncs the sources into the podman build context
#   next to the temosy-wordpress stack and rebuilds only the `kokuho` service.
#   No SSH keys / secrets needed: the runner is already on the box, and
#   `/usr/bin/podman` is NOPASSWD for the haruo user.
#
# Runner: ~/actions-runner-kokuho on Fedora (systemd user unit
# github-runner-kokuho, label `deploy`), registered to temosy/kokuho-checker.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Serialize deploys for this repo (let a running deploy finish; don't cancel).
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Local counterpart of scripts/sync.sh: make the podman build context
      # (sibling of the temosy-wordpress stack) an exact mirror of this checkout.
      - name: Sync sources to build context
        run: |
          rsync -a --delete \
            --exclude '.git' --exclude 'target' \
            "$GITHUB_WORKSPACE"/ "$HOME"/kakari-deploy/kokuho-checker/

      # Rebuild only the kokuho service in the rootful temosy-wordpress stack.
      # wp-nginx and the DB are untouched. sudo is passwordless for podman.
      #
      # IMPORTANT: `podman compose up -d --build` rebuilds the image but this host's
      # podman-compose provider does NOT recreate a container that is already running
      # (empirically confirmed 2026-07-16: a fresh image was built but the running
      # container kept the OLD image; /kokuho/ still returned 200 so it looked green).
      # `podman restart` is also broken here (conmon exits prematurely). So: build the
      # image, force-remove the old container, then recreate it from the new image.
      - name: Rebuild kokuho container
        run: |
          cd "$HOME"/kakari-deploy/temosy-wordpress
          sudo podman compose build kokuho
          sudo podman rm -f temosy-wordpress_kokuho_1 || true
          sudo podman compose up -d kokuho

      # Verify: (1) the running container really is the freshly built image (guards
      # against the silent no-recreate failure above), then (2) the live URL.
      - name: Verify live site
        run: |
          latest=$(sudo podman image inspect -f '{{.Id}}' localhost/temosy-wordpress_kokuho:latest)
          running=$(sudo podman inspect -f '{{.Image}}' temosy-wordpress_kokuho_1)
          if [ "$latest" != "$running" ]; then
            echo "::error::kokuho container is not running the freshly built image (running=$running latest=$latest)"
            exit 1
          fi
          echo "  container image matches latest build ✓"
          curl -fsS -o /dev/null -w "  https://temosy.com/kokuho/ HTTP %{http_code}\n" \
            --resolve temosy.com:443:127.0.0.1 https://temosy.com/kokuho/
